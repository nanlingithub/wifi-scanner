name: 构建与发布 WiFi 专业工具

on:
  push:
    tags:
      - 'v*.*.*'        # 推送版本标签时触发，如 v1.6.3
  workflow_dispatch:    # 支持手动触发
    inputs:
      create_release:
        description: '是否创建 Release（仅手动触发时有效）'
        required: false
        type: boolean
        default: false

permissions:
  contents: write       # 创建 Release 需要写权限

jobs:
  # ─────────────────────────────────────────────────────
  # Job 1: 构建 Windows EXE
  # ─────────────────────────────────────────────────────
  build-windows:
    name: 🪟 构建 Windows EXE
    runs-on: windows-latest

    steps:
      - name: 📥 检出代码
        uses: actions/checkout@v4

      - name: 🐍 设置 Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📦 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install "pyinstaller>=6.0.0"

      - name: 🔨 构建 Windows EXE
        run: |
          pyinstaller wifi_professional.spec --clean --noconfirm

      - name: 🗜️ 压缩构建产物
        shell: pwsh
        run: |
          Compress-Archive -Path "dist\WiFi专业工具" `
            -DestinationPath "WiFi专业工具-Windows-x64.zip" `
            -Force
          Write-Host "ZIP 大小: $([math]::Round((Get-Item 'WiFi专业工具-Windows-x64.zip').Length/1MB,1)) MB"

      - name: 📤 上传 Windows 产物
        uses: actions/upload-artifact@v4
        with:
          name: WiFi-Windows
          path: WiFi专业工具-Windows-x64.zip
          retention-days: 30

  # ─────────────────────────────────────────────────────
  # Job 2: 构建 macOS .app
  # ─────────────────────────────────────────────────────
  build-macos:
    name: 🍎 构建 macOS App
    runs-on: macos-latest

    steps:
      - name: 📥 检出代码
        uses: actions/checkout@v4

      - name: 🐍 设置 Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📦 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install "pyinstaller>=6.0.0"
          # pyobjc 在 macOS GitHub runner 上通常已预装，安装失败不阻断构建
          pip install pyobjc-framework-AppKit --quiet || true

      - name: 🔨 构建 macOS App Bundle
        run: |
          pyinstaller wifi_professional_macos.spec --clean --noconfirm

      - name: ✍️ Ad-hoc 代码签名（降低 Gatekeeper 拦截等级）
        run: |
          APP="dist/WiFi专业工具.app"

          # 1. 移除构建过程中产生的隔离扩展属性
          xattr -cr "$APP"

          # 2. 对整个 .app bundle 做递归 ad-hoc 签名
          #    identity="-" 表示本地自签，不需要 Apple Developer 账号
          #    macOS 收到 ad-hoc 签名的 App 后，右键→打开时只需一次确认即可运行
          codesign --deep \
                   --force \
                   --sign "-" \
                   --options runtime \
                   --timestamp=none \
                   "$APP"

          # 3. 验证签名
          codesign --verify --verbose "$APP" \
            && echo "✅ 代码签名验证通过" \
            || echo "⚠️ 签名验证失败（非致命，继续打包）"

      - name: 📀 创建 DMG 安装包
        run: |
          # 设置 UTF-8 locale，避免中文路径在 CI shell 环境下的编码问题
          export LANG=en_US.UTF-8
          export LC_ALL=en_US.UTF-8

          APP="dist/WiFi专业工具.app"

          # 调试：确认 App Bundle 已生成并显示实际路径
          echo "=== dist 目录内容 ==="
          ls -la dist/

          # 创建包含 Applications 快捷方式的临时目录
          mkdir -p dmg_staging
          cp -R "$APP" "dmg_staging/"
          ln -s /Applications "dmg_staging/Applications"

          # 创建 DMG：hdiutil -o 参数使用 ASCII 文件名避免中文路径编码问题
          # -volname 也用 ASCII（显示名称，非关键）
          hdiutil create \
            -srcfolder dmg_staging \
            -volname "WiFi Professional" \
            -format UDZO \
            -imagekey zlib-level=9 \
            -o "WiFiProfessional-macOS.dmg"

          # 重命名为最终中文名（artifact 上传路径需与此一致）
          mv "WiFiProfessional-macOS.dmg" "WiFi专业工具-macOS.dmg"

          echo "✅ DMG 大小: $(du -sh 'WiFi专业工具-macOS.dmg' | cut -f1)"

      - name: 📤 上传 macOS 产物
        uses: actions/upload-artifact@v4
        with:
          name: WiFi-macOS
          path: WiFi专业工具-macOS.dmg
          retention-days: 30

  # ─────────────────────────────────────────────────────
  # Job 3: 发布 GitHub Release（仅 tag 推送时执行）
  # ─────────────────────────────────────────────────────
  release:
    name: 🚀 发布 GitHub Release
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.create_release == true)

    steps:
      - name: 📥 下载所有构建产物
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: 🔍 列出产物文件
        run: |
          echo "=== 构建产物 ==="
          find artifacts -type f | sort
          echo ""
          echo "=== 文件大小 ==="
          find artifacts -type f -exec du -sh {} \;

      - name: 🏷️ 获取版本号
        id: get_version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            VERSION="${{ github.ref_name }}"
          else
            VERSION="dev-$(date +%Y%m%d)"
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "版本: ${VERSION}"

      - name: 📝 发布 GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.get_version.outputs.version }}
          name: WiFi 专业分析工具 ${{ steps.get_version.outputs.version }}
          body: |
            ## 🛜 WiFi 专业分析工具 ${{ steps.get_version.outputs.version }}

            > 适用于 Windows 和 macOS 的专业 WiFi 网络诊断与分析工具

            ---

            ### 📥 下载

            | 平台 | 文件 | 说明 |
            |------|------|------|
            | 🪟 Windows 10/11 x64 | `WiFi专业工具-Windows-x64.zip` | 解压后双击 `WiFi专业工具.exe` 运行 |
            | 🍎 macOS 12+ (Monterey+) | `WiFi专业工具-macOS.dmg` | 挂载 DMG 后将 App 拖入"应用程序"文件夹 |

            ---

            ### ✨ 主要功能

            - **WiFi 扫描** — 扫描周边所有 WiFi 热点，显示信号强度、频段、协议（WiFi 6/6E/7）
            - **信号雷达图** — 实时 T0→T11 历史趋势极坐标图，显示 dBm 数值
            - **频道分析** — 2.4GHz / 5GHz / 6GHz 频道占用和干扰分析
            - **性能压测** — 网速测试（下载/上传/延迟），支持多次历史对比
            - **企业报告** — PDF/Excel 安全合规报告（PCI-DSS、WPA3 评估）
            - **热力图** — WiFi 信号覆盖范围可视化与 AP 部署规划
            - **实时监控** — 信号变化实时折线图，可配置告警阈值

            ---

            ### 🖥️ 系统要求

            | 平台 | 要求 |
            |------|------|
            | Windows | Windows 10/11，**需要管理员权限**（用于 WiFi 扫描） |
            | macOS | macOS 12 Monterey 及以上，需要允许 WiFi 访问权限 |

            ---

            ### ⚠️ macOS 首次打开说明

            由于本应用未经 Apple 付费公证，macOS 首次打开会显示安全警告——**这是正常现象**，源码完全开放可自行审查。

            **方法一：右键打开（最简单）**
            1. 在 Finder 中找到「WiFi专业工具」
            2. **右键（或 Control+单击）** → 选择「打开」
            3. 弹出对话框中点击「打开」确认

            **方法二：终端解除隔离（一劳永逸）**
            ```bash
            xattr -cr /Applications/WiFi专业工具.app
            ```
            之后可正常双击启动。

            **方法三：系统设置允许**
            1. 双击打开，出现警告后点击「完成」
            2. 打开「系统设置 → 隐私与安全性」，滚动到底部
            3. 点击「仍然打开」

            ---

            ### ⚠️ Windows 注意事项

            - 首次运行会请求 UAC 管理员权限，请点击「是」（WiFi 扫描必须管理员权限）

          files: |
            artifacts/WiFi-Windows/WiFi专业工具-Windows-x64.zip
            artifacts/WiFi-macOS/WiFi专业工具-macOS.dmg
          draft: false
          prerelease: ${{ !startsWith(github.ref, 'refs/tags/v') }}
          generate_release_notes: true
